<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocVoice AI - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow: hidden;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.18);
        }
        
        /* Subtle animation for the background */
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        body {
            background-size: 200% 200%;
            animation: gradientMove 15s ease infinite;
        }
    </style>
</head>
<body>
    <div class="glass-card w-96 p-8 flex flex-col gap-6">
        <div class="text-center">
            <h1 class="text-3xl font-bold text-gray-800 tracking-tight">DocVoice AI</h1>
            <p class="text-sm text-gray-600 mt-2">Intelligent Clinic Assistant</p>
        </div>
        
        <form id="login-form" class="flex flex-col gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" value="admin@docvoice.ai" class="w-full px-4 py-2 rounded-lg border-0 bg-white/50 focus:bg-white focus:ring-2 focus:ring-blue-400 outline-none transition-all" required>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" value="password" class="w-full px-4 py-2 rounded-lg border-0 bg-white/50 focus:bg-white focus:ring-2 focus:ring-blue-400 outline-none transition-all" required>
            </div>
            
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-lg shadow-md transition-all mt-2">
                Login
            </button>
            <button type="button" onclick="window.location.href='/dashboard.html'" class="w-full bg-white/50 hover:bg-white/70 text-gray-800 font-semibold py-2 rounded-lg border border-white/40 shadow-sm transition-all">
                Demo Login
            </button>
        </form>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            window.location.href = '/dashboard.html';
        });
    </script>
</body>
</html>
